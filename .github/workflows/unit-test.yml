name: Go Unit Test
on: 
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ['v*.*.*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
      - run: go test -v ./...
